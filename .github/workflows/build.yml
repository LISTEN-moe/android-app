name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install React Native CLI
        run: |
          npm install -g @react-native-community/cli
          mkdir -p artifacts/root-and-remedy/node_modules/.bin
          ln -sf $(which react-native) artifacts/root-and-remedy/node_modules/.bin/react-native

      - name: Install missing babel preset
        run: |
          mkdir -p /tmp/babel-preset-install
          cd /tmp/babel-preset-install
          npm init -y
          npm install babel-preset-expo@54.0.10 --no-save
          rsync -a --ignore-existing node_modules/ "$GITHUB_WORKSPACE/artifacts/root-and-remedy/node_modules/"

      - name: Prebuild Android
        working-directory: artifacts/root-and-remedy
        run: npx expo prebuild --platform android --clean --no-install

      - name: Configure release signing
        working-directory: artifacts/root-and-remedy/android
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          keytool -genkeypair -v -keystore app/release.keystore \
            -alias "$KEY_ALIAS" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storetype PKCS12 \
            -storepass "$STORE_PASSWORD" \
            -keypass "$STORE_PASSWORD" \
            -dname "CN=Herban Root and Remedy, OU=App, O=Herban, L=City, ST=State, C=US"
          perl -0777 -pi -e 's/(signingConfigs\s*\{)/$1\n        release {\n            storeFile file("release.keystore")\n            storePassword System.getenv("RELEASE_STORE_PASSWORD")\n            keyAlias System.getenv("RELEASE_KEY_ALIAS")\n            keyPassword System.getenv("RELEASE_STORE_PASSWORD")\n        }\n/s' app/build.gradle
          perl -0777 -pi -e 's/(release\s*\{[^}]*?)signingConfig signingConfigs\.debug/$1signingConfig signingConfigs.release/s' app/build.gradle

      - name: Build release App Bundle
        working-directory: artifacts/root-and-remedy/android
        env:
          NODE_ENV: production
          RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          EXPO_PUBLIC_REVENUECAT_ANDROID_API_KEY: goog_BiICKwxhkfBJJGqpFDJuoxpgACz
          EXPO_PUBLIC_REVENUECAT_IOS_API_KEY: appl_mdlZqpCVgTbgpoPJCcEswVElQUC
        run: ./gradlew bundleRelease

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: herban-root-and-remedy
          path: artifacts/root-and-remedy/android/app/build/outputs/bundle/release/app-release.aab
